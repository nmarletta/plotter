; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:mkrwifi1010]
platform = atmelsam
board = mkrwifi1010
framework = arduino
lib_deps =
	olikraus/U8g2@^2.36.15
	greiman/SdFat@^2.2.0
monitor_speed = 250000

[env:test_serial_mgr]
platform = atmelsam
board = mkrwifi1010
framework = arduino
lib_deps =
	greiman/SdFat@^2.2.0
test_framework = unity
test_speed = 115200
test_filter = test_serial_manager
test_ignore = test_plot test_native_filters test_native_serial
build_src_filter = -<*>

[env:test_plot]
platform = atmelsam
board = mkrwifi1010
framework = arduino
lib_deps =
	greiman/SdFat@^2.2.0
test_framework = unity
test_speed = 115200
test_filter = test_plot
test_ignore = test_serial_manager test_native_filters test_native_serial
build_src_filter = -<*>

[env:test_native]
platform = native
test_framework = unity
test_filter = test_native_*
test_ignore = test_native_grbl
build_flags =
	-std=c++11
	-I test/test_native_serial/mocks
	-fsanitize=address,undefined
	-fno-omit-frame-pointer
	-g
build_src_filter = -<*>

[env:test_native_grbl]
platform = native
test_framework = unity
test_filter = test_native_grbl
build_flags =
	-std=c++11
	-I test/test_native_serial/mocks
	-fsanitize=address,undefined
	-fno-omit-frame-pointer
	-g
build_src_filter = -<*>